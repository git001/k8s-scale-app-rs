name: Build & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------
  # 1. Rust hygiene: fmt, clippy, tests (unit + no-cluster CLI tests).
  #    Cluster tests auto-skip in CI since neither KUBECONFIG nor an
  #    in-cluster SA token is present.
  # ---------------------------------------------------------------------
  test:
    name: Test (fmt · clippy · cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
          components: rustfmt, clippy

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy -D warnings
        run: cargo clippy --release --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --release

  # ---------------------------------------------------------------------
  # 2. Build both image variants (default = distroless, plus -debug),
  #    push them to ghcr.io, then:
  #      - sign the image with cosign (keyless, GitHub OIDC)
  #      - generate an SPDX SBOM with syft and attach as cosign attestation
  #      - attach SLSA build provenance
  #    PR runs build the image but skip publish + signing.
  # ---------------------------------------------------------------------
  build-image:
    name: Build & sign ${{ matrix.variant.label }} image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless + SLSA attestation
      attestations: write # actions/attest-build-provenance
    strategy:
      fail-fast: false
      matrix:
        variant:
          - label: default
            containerfile: Containerfile
            tag_suffix: ""
          - label: debug
            containerfile: Containerfile.debug
            tag_suffix: "-debug"
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=auto
            suffix=${{ matrix.variant.tag_suffix }},onlatest=true
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.variant.containerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant.label }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant.label }}

      - name: Smoke-test image (help output must succeed)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            IMAGE="local-smoke-test"
            docker buildx build \
              -f ${{ matrix.variant.containerfile }} \
              --load -t $IMAGE .
          else
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
          fi
          docker run --rm "$IMAGE" --version
          docker run --rm "$IMAGE" scale --help > /dev/null
          docker run --rm "$IMAGE" restart --help > /dev/null

      # ---- Signing & attestation -----------------------------------------
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image (keyless via Fulcio + Rekor)
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE"

      - name: Generate SPDX SBOM with syft
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.variant.label }}.spdx.json
          upload-artifact: false

      - name: Attach SBOM as cosign attestation
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes \
            --type spdxjson \
            --predicate sbom-${{ matrix.variant.label }}.spdx.json \
            "$IMAGE"

      - name: SLSA build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # ---------------------------------------------------------------------
  # 3. Package & sign the Helm chart.
  #    - On any push: lint + package (dry validation)
  #    - Push to OCI registry + cosign-sign + SLSA provenance only for
  #      tag events (avoids overwrite conflicts on GHCR immutable tags).
  # ---------------------------------------------------------------------
  publish-chart:
    name: Package & sign Helm chart
    needs: build-image
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.0

      - name: Lint chart
        run: helm lint chart

      - name: Package chart
        run: |
          mkdir -p /tmp/charts
          helm package chart --destination /tmp/charts
          ls -lh /tmp/charts

      - name: Log in to GHCR (Helm)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Log in to GHCR (docker, for cosign & provenance)
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push chart to OCI registry
        id: chart-push
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          for f in /tmp/charts/*.tgz; do
            out=$(helm push "$f" oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts 2>&1 | tee /dev/stderr)
            ref=$(echo "$out" | awk -F': ' '/^Pushed:/  {print $2}')
            digest=$(echo "$out" | awk -F': ' '/^Digest:/ {print $2}')
            name="${ref%%:*}"
            {
              echo "chart_name=${name}"
              echo "chart_digest=${digest}"
              echo "chart_ref=${name}@${digest}"
            } >> "$GITHUB_OUTPUT"
          done

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign chart artifact (keyless)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          CHART_REF: ${{ steps.chart-push.outputs.chart_ref }}
        run: cosign sign --yes "$CHART_REF"

      - name: SLSA build provenance for chart
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ steps.chart-push.outputs.chart_name }}
          subject-digest: ${{ steps.chart-push.outputs.chart_digest }}
          push-to-registry: true
