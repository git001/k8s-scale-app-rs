apiVersion: batch/v1
kind: CronJob
metadata:
  name: k8s-scale-app-rs
spec:
  schedule: "0 * * * *"
  suspend: false
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: deploy
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: scaler
              image: ghcr.io/git001/k8s-scale-app-rs:latest
              imagePullPolicy: IfNotPresent
              # Default mode. Override in an overlay by patching args to ["restart"].
              # K8S_SCALE_REPLICAS is ignored when args is "restart".
              args:
                - scale
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              env:
                - name: K8S_SCALE_DEPLOYMENT
                  value: "REPLACE_ME"
                - name: K8S_SCALE_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: K8S_SCALE_REPLICAS
                  value: "1"
                - name: K8S_SCALE_DRY_RUN
                  value: "false"
                - name: RUST_LOG
                  value: "info"
              resources:
                limits:
                  cpu: 100m
                  memory: 64Mi
                requests:
                  cpu: 10m
                  memory: 16Mi
