apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: my-app-dev

resources:
  - ../../base

# Dev creates the "deploy" SA. For preprod/prod the SA is assumed to exist.
components:
  - ../../components/serviceaccount
  - ../../components/rbac

images:
  - name: ghcr.io/git001/k8s-scale-app-rs
    newTag: dev

# Generate the extra-ca-bundle ConfigMap consumed by the CronJob.
# The CronJob in base mounts a ConfigMap named "extra-ca-bundle" with key
# "ca-bundle.pem"; this generator produces it from the local PEM file.
configMapGenerator:
  - name: extra-ca-bundle
    files:
      - ca-bundle.pem
    options:
      disableNameSuffixHash: true

patches:
  - path: cronjob-patch.yaml
    target:
      kind: CronJob
      name: k8s-scale-app-rs
