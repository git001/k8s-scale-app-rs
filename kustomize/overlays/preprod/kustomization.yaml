apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: my-app-preprod

resources:
  - ../../base

# Preprod assumes the "deploy" ServiceAccount already exists in the namespace
# and only opts in to the namespace-scoped RBAC. To also create the SA,
# add ../../components/serviceaccount to the components list.
components:
  - ../../components/rbac

# The CronJob in base mounts a ConfigMap "extra-ca-bundle" with key
# "ca-bundle.pem". Generate it from a local PEM file:
# configMapGenerator:
#   - name: extra-ca-bundle
#     files:
#       - ca-bundle.pem
#     options:
#       disableNameSuffixHash: true

images:
  - name: ghcr.io/git001/k8s-scale-app-rs
    newTag: preprod

patches:
  - path: cronjob-patch.yaml
    target:
      kind: CronJob
      name: k8s-scale-app-rs
