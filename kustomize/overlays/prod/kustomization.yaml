apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: my-app-prod

resources:
  - ../../base

# Prod assumes the "deploy" ServiceAccount already exists in the namespace
# and only opts in to the namespace-scoped RBAC. To also create the SA,
# add ../../components/serviceaccount to the components list.
#
# To mount a corporate CA bundle, additionally include ../../components/extra-ca
# and generate the ConfigMap here (see the commented configMapGenerator below).
components:
  - ../../components/rbac
  # - ../../components/extra-ca

# configMapGenerator:
#   - name: extra-ca-bundle
#     files:
#       - ca-bundle.pem
#     options:
#       disableNameSuffixHash: true

images:
  - name: ghcr.io/git001/k8s-scale-app-rs
    newTag: stable

patches:
  - path: cronjob-patch.yaml
    target:
      kind: CronJob
      name: k8s-scale-app-rs
