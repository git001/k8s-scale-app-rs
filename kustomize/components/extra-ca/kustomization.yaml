apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Optional component: mounts a ConfigMap named "extra-ca-bundle" (key
# ca-bundle.pem) into the CronJob pod and points the CLI at it via
# K8S_SCALE_EXTRA_CA_BUNDLE. The overlay including this component must
# also provide the ConfigMap — typically via configMapGenerator in the
# overlay's kustomization.yaml.

patches:
  - path: cronjob-patch.yaml
    target:
      kind: CronJob
      name: k8s-scale-app-rs
