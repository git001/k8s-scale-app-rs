{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "k8s-scale-app-rs.fullname" . }}-scaler
  labels:
    {{- include "k8s-scale-app-rs.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "k8s-scale-app-rs.fullname" . }}-scaler
subjects:
  - kind: ServiceAccount
    name: {{ include "k8s-scale-app-rs.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
