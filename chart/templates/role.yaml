{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "k8s-scale-app-rs.fullname" . }}-scaler
  labels:
    {{- include "k8s-scale-app-rs.labels" . | nindent 4 }}
rules:
  # get:   used in both modes
  # patch: needed by the "restart" mode to update spec.template.metadata.annotations
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
  # scale subresource: used by the "scale" mode
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch", "update"]
{{- end }}
